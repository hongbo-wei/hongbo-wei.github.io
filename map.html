<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Map</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #map {
            width: 90vmin;
            height: 90vmin;
            max-width: 90vmin;
            max-height: 90vmin;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 50%;
            box-shadow: 0 18px 35px rgba(0,0,0,0.2);
        }
        #map iframe,
        #map canvas,
        #map > div {
            width: 100% !important;
            height: 100% !important;
            max-width: 100% !important;
            max-height: 100% !important;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="map">
        <script type="text/javascript" id="clstr_globe" src="https://clustrmaps.com/globe.js?d=YgWdHCkJi9jii45ReF_lG6XfjkX6EY71WmJlCaYnpMs"></script>
    </div>
</body>
</html>
