<!DOCTYPE html>
<html lang="en">
<head>
    <title>Offline - Hongbo Wei</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0c0c0c">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon_io/favicon-32x32.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0c0c;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            opacity: 0.8;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        p {
            font-size: 16px;
            opacity: 0.7;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .retry-btn {
            background: #0f33ff;
            color: #fff;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .retry-btn:hover {
            background: #1a4aff;
        }
        .home-link {
            margin-top: 16px;
            color: #0f33ff;
            text-decoration: none;
            font-size: 14px;
        }
        .home-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some pages may still be available from cache.</p>
    <button class="retry-btn" onclick="location.reload()">Try Again</button>
    <a class="home-link" href="/">Go to Homepage</a>
</body>
</html>
