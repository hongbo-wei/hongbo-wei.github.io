name: Lint

on:
  push:
    paths:
      - "*.html"
      - ".htmlhintrc"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "*.html"
      - ".htmlhintrc"
      - ".github/workflows/lint.yml"

jobs:
  htmlhint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: HTMLHint
        run: npx --yes htmlhint@1.1.4 *.html -c .htmlhintrc
